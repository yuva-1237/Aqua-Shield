<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaShield | Login</title>
    <link rel="stylesheet" href="auth.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="auth-background"></div>
    
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-logo">AquaShield</h1>
            <p class="auth-subtitle">Secure Environmental Intelligence</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
                <div id="email-error" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
                <div id="password-error" class="error-message"></div>
            </div>

            <button type="submit" class="auth-btn" id="login-btn">LOGIN TO DASHBOARD</button>
            <div id="general-error" class="error-message" style="text-align: center;"></div>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.from('.auth-container', { 
                opacity: 0, 
                y: 30, 
                duration: 1.2, 
                ease: 'power3.out' 
            });
            gsap.from('.auth-header', { opacity: 0, delay: 0.5, duration: 1 });
            gsap.from('.form-group', { opacity: 0, y: 10, stagger: 0.1, delay: 0.7, duration: 0.8 });
        });
    </script>
</body>
</html>
